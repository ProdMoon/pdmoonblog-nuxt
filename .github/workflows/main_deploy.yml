name: Deploy Nuxt 3 App to Raspberry Pi

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'

    - name: Install dependencies
      run: npm install

    - name: Build
      run: npm run build

    - name: Clean remote directory
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.RASPI_SSH_HOST }}
        username: ${{ secrets.RASPI_SSH_USERNAME }}
        password: ${{ secrets.RASPI_SSH_PASSWORD }}
        port: 22
        script: |
          if [ -d "/home/${{ secrets.RASPI_SSH_USERNAME }}/source/pdmoonblog/nuxt-app" ]; then
            rm -rf /home/${{ secrets.RASPI_SSH_USERNAME }}/source/pdmoonblog/nuxt-app
          fi

    - name: Copy files via SSH
      uses: appleboy/scp-action@v1
      with:
        host: ${{ secrets.RASPI_SSH_HOST }}
        username: ${{ secrets.RASPI_SSH_USERNAME }}
        password: ${{ secrets.RASPI_SSH_PASSWORD }}
        port: 22
        source: ./.output/
        target: /home/${{ secrets.RASPI_SSH_USERNAME }}/source/pdmoonblog/nuxt-app/

    - name: Copy ecosystem.config.cjs via SSH
      uses: appleboy/scp-action@v1
      with:
        host: ${{ secrets.RASPI_SSH_HOST }}
        username: ${{ secrets.RASPI_SSH_USERNAME }}
        password: ${{ secrets.RASPI_SSH_PASSWORD }}
        port: 22
        source: ./ecosystem.config.cjs
        target: /home/${{ secrets.RASPI_SSH_USERNAME }}/source/pdmoonblog/nuxt-app/

    - name: Deploy to server
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.RASPI_SSH_HOST }}
        username: ${{ secrets.RASPI_SSH_USERNAME }}
        password: ${{ secrets.RASPI_SSH_PASSWORD }}
        port: 22
        script: |
          cd /home/${{ secrets.RASPI_SSH_USERNAME }}/source/pdmoonblog/nuxt-app/
          pm2 stop ecosystem.config.cjs || true
          pm2 delete ecosystem.config.cjs || true
          pm2 start ecosystem.config.cjs
